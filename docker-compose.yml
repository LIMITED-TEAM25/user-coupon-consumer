services:
  user-coupon-consumer:
    container_name: user-coupon-consumer
    image: chokyuseong/user-coupon-consumer:scheduler
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USERNAME: ${USERNAME}
        SECRET_KEY: ${SECRET_KEY}
    ports:
      - '29091:29091'
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    mem_limit: 1024mb
    cpus: 1
    networks:
      - limited-team25

networks:
  limited-team25:
    external: true